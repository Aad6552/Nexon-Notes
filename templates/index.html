<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ubuntu Notes</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app">
  <!-- Fake traffic light titlebar -->
  <div class="titlebar">
    <div class="titlebar-dots">
      <div class="titlebar-dot close"></div>
      <div class="titlebar-dot min"></div>
      <div class="titlebar-dot max"></div>
    </div>
    <div class="titlebar-title">Ubuntu Notes</div>
  </div>

  <div class="app-body">
    <!-- ─── SIDEBAR ─── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <!-- Ubuntu SVG Logo -->
          <svg class="brand-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="#E95420"/>
            <!-- Three friend dots -->
            <circle cx="50" cy="16" r="11" fill="white"/>
            <circle cx="78" cy="68" r="11" fill="white"/>
            <circle cx="22" cy="68" r="11" fill="white"/>
            <!-- Connecting arcs (three arcs of the ring) -->
            <!-- Top-right arc -->
            <path d="M57 22 Q78 32 73 59" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
            <!-- Bottom arc -->
            <path d="M71 74 Q50 85 29 74" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
            <!-- Top-left arc -->
            <path d="M27 59 Q22 32 43 22" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
          </svg>
          <span class="brand-name">Ubuntu Notes</span>
        </div>
      </div>

      <div class="sidebar-search">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Search notes…" autocomplete="off">
      </div>

      <div class="sidebar-section-title">Folders</div>

      <nav id="folder-list">
        <div class="folder-item active" data-folder="all">
          <span class="folder-icon">📋</span>
          <span class="folder-name">All Notes</span>
          <span class="folder-count" id="count-all">0</span>
        </div>
        <!-- Dynamic folders injected here -->
        <div class="sidebar-divider"></div>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-new-folder" id="btn-new-folder">
          <span>＋</span> New Folder
        </button>
      </div>
    </aside>

    <!-- ─── NOTES LIST ─── -->
    <section class="notes-panel">
      <div class="notes-panel-header">
        <span class="notes-panel-title" id="panel-title">All Notes</span>
        <span class="notes-panel-count" id="panel-count"></span>
        <button class="btn-new-note" id="btn-new-note" title="New note">+</button>
      </div>
      <div class="sort-bar">
        <span class="sort-label">Sort by</span>
        <select class="sort-select" id="sort-select">
          <option value="updated">Date Edited</option>
          <option value="created">Date Created</option>
          <option value="title">Title</option>
        </select>
      </div>
      <div class="notes-list" id="notes-list">
        <div class="empty-state">
          <div class="empty-state-icon">📝</div>
          <div class="empty-state-text">No notes yet.<br>Click + to create one.</div>
        </div>
      </div>
    </section>

    <!-- ─── EDITOR ─── -->
    <main class="editor-panel">
      <div class="editor-toolbar hidden" id="editor-toolbar">
        <div class="toolbar-group">
          <button class="toolbar-btn" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
          <button class="toolbar-btn" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
          <button class="toolbar-btn" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
          <button class="toolbar-btn" data-cmd="strikeThrough" title="Strikethrough">
            <svg viewBox="0 0 16 16"><path d="M8 1a3.5 3.5 0 0 0-3.5 3.5V5H6V4.5A1.5 1.5 0 0 1 8 3h.5A1.5 1.5 0 0 1 10 4.5V5h2v-.5A3.5 3.5 0 0 0 8.5 1H8zM2 7.5h12v1H2v-1zM4.5 10H6v.5A1.5 1.5 0 0 0 7.5 12h1A1.5 1.5 0 0 0 10 10.5V10h1.5v.5a3 3 0 0 1-3 3h-1a3 3 0 0 1-3-3V10z"/></svg>
          </button>
        </div>
        <div class="toolbar-group">
          <button class="toolbar-btn" data-cmd="insertUnorderedList" title="Bullet List">
            <svg viewBox="0 0 16 16"><path d="M2 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm2-1.5h10v1H4v-1zm0 5h10v1H4v-1zm0 5h10v1H4v-1zM2 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm0 5a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
          </button>
          <button class="toolbar-btn" data-cmd="insertOrderedList" title="Numbered List">
            <svg viewBox="0 0 16 16"><path d="M1 2.5A.5.5 0 0 1 1.5 2h1a.5.5 0 0 1 0 1h-.5v1h.5a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5v-2zm3 .5h9v1H4v-1zm0 4.5h9v1H4v-1zm0 4.5h9v1H4v-1zM1 7h1.5a.5.5 0 0 1 0 1H1.5v.5H2a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5H1a.5.5 0 0 1 0-1h.5V9H1a.5.5 0 0 1 0-1zm0 4.5h1a.5.5 0 0 1 .5.5v.5H1a.5.5 0 0 1 0 1h1.5v.5H1a.5.5 0 0 1-.5-.5v-1.5a.5.5 0 0 1 .5-.5z"/></svg>
          </button>
        </div>
        <div class="toolbar-group">
          <button class="toolbar-btn" data-cmd="formatBlock-H1" title="Heading 1">H1</button>
          <button class="toolbar-btn" data-cmd="formatBlock-H2" title="Heading 2">H2</button>
          <button class="toolbar-btn" data-cmd="removeFormat" title="Clear Format">
            <svg viewBox="0 0 16 16"><path d="M3.502 1h9.996a.5.5 0 0 1 .4.8L12 4.5 9.5 7l-1 3.5L7 12H5l.5-2H4l.5-2H3l1.5-4L3.1 1.8a.5.5 0 0 1 .402-.8zm2 2L4.5 6H6l-.5 2H7l-.5 2h.5l1-3.5L10.5 4H7l-.5-1H5.5z"/></svg>
          </button>
        </div>
        <div class="toolbar-spacer"></div>
        <div class="toolbar-group">
          <button class="toolbar-btn" id="btn-delete-note" title="Delete Note" style="color:#D44">
            <svg viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
          </button>
        </div>
      </div>

      <div id="editor-note-info" class="editor-note-info" style="display:none">
        <span id="editor-date"></span>
        <span class="note-info-folder">
          in
          <select id="editor-folder-select"></select>
        </span>
      </div>

      <div class="editor-content-wrap" id="editor-wrap">
        <div class="editor-placeholder" id="editor-placeholder">
          <div class="editor-placeholder-icon">📝</div>
          <h3>Select or create a note</h3>
          <p>Your notes are saved locally on this computer.</p>
        </div>
        <div
          class="editor-content"
          id="editor-content"
          contenteditable="false"
          spellcheck="true"
          style="display:none"
        ></div>
      </div>
    </main>
  </div>
</div>

<!-- ─── NEW FOLDER MODAL ─── -->
<div class="modal-overlay hidden" id="modal-new-folder">
  <div class="modal">
    <h3>New Folder</h3>
    <input type="text" id="new-folder-name" placeholder="Folder name" maxlength="64">
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Create</button>
    </div>
  </div>
</div>

<!-- ─── CONTEXT MENU ─── -->
<div class="context-menu hidden" id="context-menu">
  <div class="ctx-item" id="ctx-move">
    <span>📁</span> Move to…
  </div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" id="ctx-delete">
    <span>🗑</span> Delete Note
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
